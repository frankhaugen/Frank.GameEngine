# Ensures build + TUnit (Microsoft.Testing.Platform) pass on .NET 10 SDK (linux + windows).
name: Verify .NET

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

env:
  # Hosted runners are moving default Node for actions to 24; opt in early to avoid surprise failures.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  verify:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Restore
        run: dotnet restore Frank.GameEngine.slnx

      - name: Build test project
        run: dotnet build tests/Frank.GameEngine.Tests/Frank.GameEngine.Tests.csproj -c Release --no-restore

      # TUnit enables a GitHub step-summary reporter when GITHUB_ACTIONS is set; disable it on CI.
      # See https://tunit.dev/docs/execution/ci-cd-reporting
      - name: Run tests
        env:
          TUNIT_DISABLE_GITHUB_REPORTER: true
          DISABLE_GITHUB_REPORTER: true
        run: dotnet test --project tests/Frank.GameEngine.Tests/Frank.GameEngine.Tests.csproj -c Release --no-build --verbosity normal

      - name: Upload test logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-output-${{ matrix.os }}
          path: |
            artifacts/bin/Frank.GameEngine.Tests/**/TestResults/**
          if-no-files-found: ignore
