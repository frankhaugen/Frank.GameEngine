# Ensures build + TUnit (Microsoft.Testing.Platform) pass on .NET 10 SDK (linux + windows).
# Reusable workflows under frankhaugen/Workflows may use different commands; this job is the source of truth for this repo.
name: Verify .NET

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Restore
        run: dotnet restore Frank.GameEngine.slnx

      # Target the test project explicitly; `dotnet test --solution` + MTP has been unreliable in CI for this repo.
      - name: Test (Microsoft.Testing.Platform)
        run: dotnet test --project tests/Frank.GameEngine.Tests/Frank.GameEngine.Tests.csproj -c Release --no-restore
