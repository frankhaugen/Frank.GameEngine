# Ensures build + TUnit (Microsoft.Testing.Platform) pass on .NET 10 SDK (linux + windows).
name: Verify .NET

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Restore
        run: dotnet restore Frank.GameEngine.slnx

      - name: Build test project
        run: dotnet build tests/Frank.GameEngine.Tests/Frank.GameEngine.Tests.csproj -c Release --no-restore

      # Unset GITHUB_ACTIONS (step env "" does not remove the var). TUnit + GitHub reporter has exited non-zero on hosted runners despite all tests passing.
      - name: Run tests (TUnit executable, Linux)
        if: runner.os == 'Linux'
        run: env -u GITHUB_ACTIONS dotnet run --project tests/Frank.GameEngine.Tests/Frank.GameEngine.Tests.csproj -c Release --no-build -- --no-ansi

      - name: Run tests (TUnit executable, Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Remove-Item Env:GITHUB_ACTIONS -ErrorAction SilentlyContinue
          dotnet run --project tests/Frank.GameEngine.Tests/Frank.GameEngine.Tests.csproj -c Release --no-build -- --no-ansi
