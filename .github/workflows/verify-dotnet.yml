# Ensures build + TUnit (Microsoft.Testing.Platform) pass on .NET 10 SDK (linux + windows).
name: Verify .NET

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v5
        with:
          global-json-file: global.json

      - name: Restore
        run: dotnet restore Frank.GameEngine.slnx

      - name: Build solution
        run: dotnet build Frank.GameEngine.slnx -c Release --no-restore

      - name: Pack libraries (NuGet)
        run: dotnet pack Frank.GameEngine.slnx -c Release --no-build -p:ContinuousIntegrationBuild=true

      # TUnit enables a GitHub step-summary reporter when GITHUB_ACTIONS is set; disable it on CI.
      # See https://tunit.dev/docs/execution/ci-cd-reporting
      - name: Run tests
        env:
          TUNIT_DISABLE_GITHUB_REPORTER: true
          DISABLE_GITHUB_REPORTER: true
        run: >
          dotnet test --project tests/Frank.GameEngine.Tests/Frank.GameEngine.Tests.csproj
          -c Release --no-build --verbosity normal
          --
          --report-trx
          --results-directory "${{ github.workspace }}/test-output"
          --report-trx-filename ci.trx

      - name: Summarize TRX on failure
        if: failure()
        shell: bash
        run: |
          set -e
          if [[ -f test-output/ci.trx ]]; then
            echo "---- ci.trx (failed / error lines) ----"
            grep -E 'testMethod|outcome="(Failed|Error)"|Message>|StackTrace>' test-output/ci.trx | head -120 || true
          else
            echo "No ci.trx at test-output/ci.trx"
            find . -name '*.trx' -print 2>/dev/null || true
          fi

      - name: Upload test logs on failure
        if: failure()
        uses: actions/upload-artifact@v5
        with:
          name: test-output-${{ matrix.os }}
          path: |
            artifacts/bin/Frank.GameEngine.Tests/**/TestResults/**
            test-output/**
          if-no-files-found: ignore
