# Ensures build + TUnit (Microsoft.Testing.Platform) pass on .NET 10 SDK (linux + windows).
name: Verify .NET

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Restore
        run: dotnet restore Frank.GameEngine.slnx

      - name: Build test project
        run: dotnet build tests/Frank.GameEngine.Tests/Frank.GameEngine.Tests.csproj -c Release --no-restore

      # `dotnet test` + MTP returned non-zero on Actions for this repo; `dotnet run` is the supported TUnit host.
      # Clear GITHUB_ACTIONS for the test process: TUnit's GitHub reporter + MTP has produced a false non-zero exit on hosted runners.
      - name: Run tests (TUnit executable)
        env:
          GITHUB_ACTIONS: ""
        run: dotnet run --project tests/Frank.GameEngine.Tests/Frank.GameEngine.Tests.csproj -c Release --no-build -- --no-ansi
